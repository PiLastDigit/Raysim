name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Sync (dev + ray)
        run: uv sync --extra dev --extra ray
        # ray extra includes embreex on both OSes and healpy on Linux/macOS only
        # (per pyproject.toml's platform marker). Windows uses the vendored pix2vec
        # fallback — see docs/decisions/phase-0.md.

      - name: Lint
        run: uv run ruff check .

      - name: Typecheck
        run: uv run mypy

      - name: Tests
        run: uv run pytest -ra
