# Analytic ∑ρL fixtures for the Phase A acceptance suite (§A.7).
#
# All densities in g/cm³ (per MVP_PLAN §3 I/O units), thicknesses in mm, and
# the resulting ∑ρL in g/cm². Phase A acceptance: relative error ≤ 1e-5 vs. these
# closed-form values on the principal axes.
#
# Reference densities below are the MVP defaults; final values are pulled from
# the material library at run time (B2.1).

defaults:
  densities_g_cm3:
    aluminum: 2.70   # Al 6061 nominal
    copper: 8.96
    fr4: 1.85
    gaas: 5.32

geometries:

  aluminum_box:
    description: |
      Solid 100 mm Al cube centered at origin. Principal-axis ray entering the
      +Z face at the centroid traverses the full 100 mm in Al, exiting on -Z.
    rays:
      - origin: [0, 0, 200]
        direction: [0, 0, -1]
        chord_lengths_mm:
          aluminum: 100.0
        sigma_rho_l_g_cm2: 27.0   # 2.70 g/cm³ × 10 cm

  solid_sphere:
    description: |
      Solid 50 mm-radius Al sphere. Ray with impact parameter d (perpendicular
      offset from the sphere center) traverses 2 √(R²−d²) of Al.
    sphere:
      radius_mm: 50.0
      material: aluminum
    rays:
      - origin: [0, 0, 200]
        direction: [0, 0, -1]
        impact_mm: 0.0
        chord_lengths_mm:
          aluminum: 100.0
        sigma_rho_l_g_cm2: 27.0
      - origin: [25, 0, 200]
        direction: [0, 0, -1]
        impact_mm: 25.0
        chord_lengths_mm:
          aluminum: 86.6025403784   # 2 √(50² − 25²)
        sigma_rho_l_g_cm2: 23.382686

  concentric_shell:
    description: |
      Outer Al sphere R=50 mm with inner Cu sphere R=20 mm, concentric. A radial
      ray traverses Al from R=50 → R=20, then Cu from R=20 → -20, then Al from
      -20 → -50. Ray with impact d > 20 mm misses the Cu core.
    rays:
      - origin: [0, 0, 200]
        direction: [0, 0, -1]
        impact_mm: 0.0
        chord_lengths_mm:
          aluminum: 60.0    # 2 × (50 − 20)
          copper: 40.0      # 2 × 20
        sigma_rho_l_g_cm2: 51.86       # 0.06×2.70×100 (Al, in g/cm²) wait no — 60 mm × 2.70 g/cm³ = 16.2 g/cm² + 40 mm × 8.96 = 35.84 → 52.04
        # NB: keep single-source-of-truth in code, not here. Tests recompute from densities.
      - origin: [30, 0, 200]
        direction: [0, 0, -1]
        impact_mm: 30.0
        chord_lengths_mm:
          aluminum: 80.0    # 2 √(50² − 30²)
          copper: 0.0       # misses 20-mm core
        sigma_rho_l_g_cm2: 21.6        # 80 mm × 2.70 g/cm³

# Conventions:
#   * ∑ρL is computed as sum_i (chord_length_mm_i / 10) × density_i_g_cm3.
#   * Test code recomputes the target from `chord_lengths_mm` × `defaults.densities_g_cm3`
#     so the YAML is the *geometric* truth and densities can drift independently.
