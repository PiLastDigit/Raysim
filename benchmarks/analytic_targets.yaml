# Analytic ∑ρL fixtures for the Phase A acceptance suite (§A.7).
#
# All densities in g/cm³ (per MVP_PLAN §3 I/O units), thicknesses in mm, and
# the resulting ∑ρL in g/cm². Phase A acceptance: relative error ≤ 1e-5 vs. these
# closed-form values for rays whose hit points coincide exactly with mesh
# vertices (cube faces; uv_sphere ±Z poles).
#
# Off-axis rays through *any* triangulated sphere have an O(edge²/R) sagitta
# error and are intentionally NOT in the 1e-5 acceptance set. Use the box
# fixtures for arbitrary-angle 1e-5 tests; box faces are exact at any angle.
#
# Reference densities are the MVP defaults; tests recompute ∑ρL from
# `chord_lengths_mm` × `defaults.densities_g_cm3` so the YAML stays the
# *geometric* truth and densities can drift independently in the library.

defaults:
  densities_g_cm3:
    aluminum: 2.70   # Al 6061 nominal
    copper: 8.96
    fr4: 1.85
    gaas: 5.32

geometries:

  aluminum_box:
    description: |
      Solid 100 mm Al cube centered at origin. Box faces are flat — chord
      length is analytically exact at any ray angle, including off-axis.
    rays:
      - origin: [0, 0, 200]
        direction: [0, 0, -1]
        chord_lengths_mm:
          aluminum: 100.0
        sigma_rho_l_g_cm2: 27.0   # 2.70 g/cm³ × 10 cm

  solid_sphere:
    description: |
      Solid 50 mm-radius Al sphere. Built as ``uv_sphere`` so the ±Z poles
      are exact mesh vertices — only the principal-axis ray is in the 1e-5
      acceptance set. Off-axis rays have O(edge²/R) sagitta error and are
      excluded from this YAML by design.
    sphere:
      radius_mm: 50.0
      material: aluminum
    rays:
      - origin: [0, 0, 200]
        direction: [0, 0, -1]
        impact_mm: 0.0
        chord_lengths_mm:
          aluminum: 100.0
        sigma_rho_l_g_cm2: 27.0

  concentric_shell:
    description: |
      Hollow Al shell (R=20→50) enclosing a solid Cu sphere (R=20).
      Built so all four pole crossings (±Z on R=20 and R=50) are exact mesh
      vertices — the principal-axis chord is analytically exact and the inner
      Al cavity face is *coincident* with the Cu outer face by design,
      exercising A.4's tied-batch / B1.5's ``contact_only`` path.
    rays:
      - origin: [0, 0, 200]
        direction: [0, 0, -1]
        impact_mm: 0.0
        chord_lengths_mm:
          aluminum: 60.0    # 2 × (50 − 20)
          copper: 40.0      # 2 × 20
        sigma_rho_l_g_cm2: 52.04   # 6.0 × 2.70 + 4.0 × 8.96

  custom_test_article:
    description: |
      Multi-material test article. Outer Al box is a true hollow shell
      (2 mm wall, 196 mm cavity) — a center-of-face +Z ray traverses 2 mm Al
      (top wall) + air-gap to PCB + 1.6 mm FR4 + air-gap to battery +
      20 mm Cu (battery) + air-gap to bottom + 2 mm Al (bottom wall).
      The 0.5 mm GaAs solar panel sits *outside* the +Z face.
    rays:
      - origin: [0, 0, 300]
        direction: [0, 0, -1]
        chord_lengths_mm:
          gaas: 0.5         # solar panel outer
          aluminum: 4.0     # 2 mm top wall + 2 mm bottom wall
          copper: 20.0      # battery
          fr4: 1.6          # PCB
        sigma_rho_l_g_cm2: 19.562   # 0.05×5.32 + 0.4×2.70 + 2.0×8.96 + 0.16×1.85

# Conventions:
#   * ∑ρL is computed as sum_i (chord_length_mm_i / 10) × density_i_g_cm3.
#   * Test code recomputes the target from `chord_lengths_mm` × `defaults.densities_g_cm3`
#     so the YAML is the *geometric* truth and densities can drift independently.
